kind = "web"
previewPath = "/"
title = "UXPLORES DESIGN STUDIO"
version = "1.0.0"
id = "artifacts/uxplores"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24165
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/uxplores run dev"

[services.env]
PORT = "24165"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/uxplores", "run", "build"]
publicDir = "artifacts/uxplores/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
